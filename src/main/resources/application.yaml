logging:
  level:
    org.zalando.logbook: trace

spring:
  sql:
    init:
      mode: ALWAYS
      schema-locations:
        - classpath:schema.sql
  datasource:
    url: jdbc:h2:file:./db/filmorate
    driverClassName: org.h2.Driver
    username: sa
    password: 12345
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false


server:
  port: 8080